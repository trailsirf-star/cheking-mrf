<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>MRF SMS | Admin Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800;900&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="/admin.css">
</head>
<body>
    <main class="admin-login-page">
        <section class="admin-login-card" aria-labelledby="admin-login-title">
            <div class="admin-login-brand">
                <span class="admin-brand-mark">MRF</span>
                <div>
                    <h1 id="admin-login-title" class="admin-login-title">Admin Login</h1>
                    <p class="admin-login-copy">Sign in to open the independent admin dashboard.</p>
                </div>
            </div>
            <div id="admin-login-error" class="admin-login-error" role="alert" aria-live="assertive"></div>
            <form id="admin-login-form" class="admin-login-form" autocomplete="off">
                <input id="admin-login-email" class="admin-login-input" name="admin-email" type="email" placeholder="Admin email" autocomplete="off" autocapitalize="none" autocorrect="off" spellcheck="false" required>
                <input id="admin-login-password" class="admin-login-input" name="admin-password" type="password" placeholder="Password" autocomplete="off" required>
                <button id="admin-login-submit" class="admin-login-submit" type="submit">Login to Admin Dashboard</button>
            </form>
            <div class="admin-login-footer"><a href="/">Back to customer site</a></div>
        </section>
    </main>
    <script src="/admin-login.js"></script>
</body>
</html>
